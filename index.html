<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#070b18">
  <title>NeoRead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      height: 100%;
      background: #070b18;
      color: #eef2ff;
      font-family: 'Syne', -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
      overflow: hidden;
    }
    button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
    input, textarea { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* === ROOT HEIGHT (JS sets --vh) === */
    #root {
      height: calc(var(--vh, 1vh) * 100);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #070b18;
    }

    /* === LAYOUT === */
    .content-area { flex: 1; overflow: hidden; position: relative; }
    .tab-panel { position: absolute; inset: 0; display: flex; flex-direction: column; }
    .tab-panel.hidden { display: none; }
    .scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; flex: 1; }

    /* === GLASS === */
    .glass {
      background: rgba(255,255,255,.042);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 22px;
    }

    /* === GRADIENT TEXT === */
    .grad {
      background: linear-gradient(130deg, #38bdf8 0%, #818cf8 50%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* === LABEL === */
    .lbl { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(238,242,255,.28); }

    /* === PYRAMID BLOCKS === */
    .blk { width: 18px; height: 18px; border-radius: 5px; }
    .blk-on {
      background: linear-gradient(145deg, #38bdf8, #0284c7);
      box-shadow: 0 0 6px rgba(56,189,248,.5), inset 0 1px 0 rgba(255,255,255,.2);
    }
    .blk-today {
      background: linear-gradient(145deg, #38bdf8, #f472b6);
      animation: todayPulse 2s ease-in-out infinite;
    }
    .blk-off { background: rgba(255,255,255,.032); border: 1px solid rgba(255,255,255,.055); }
    .blk-goal { background: rgba(251,191,36,.07); border: 1px solid rgba(251,191,36,.2); }

    /* === PROGRESS === */
    .prog-track { height: 3px; border-radius: 4px; background: rgba(255,255,255,.07); overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg,#38bdf8,#f472b6); transition: width .5s ease; }

    /* === INPUTS === */
    .inp {
      width: 100%;
      background: rgba(255,255,255,.042);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 16px;
      color: #eef2ff;
      outline: none;
      -webkit-appearance: none;
      transition: border-color .2s;
    }
    .inp:focus { border-color: rgba(56,189,248,.4); }
    .inp::placeholder { color: rgba(238,242,255,.2); }
    textarea.inp { resize: none; line-height: 1.6; }

    /* === BUTTONS === */
    .btn-log {
      width: 100%; padding: 20px 0; border-radius: 20px;
      font-size: 18px; font-weight: 900; letter-spacing: 0.05em;
      background: rgba(56,189,248,.1);
      border: 1px solid rgba(56,189,248,.3);
      color: #38bdf8;
      box-shadow: 0 0 20px rgba(56,189,248,.15), inset 0 0 10px rgba(56,189,248,.05);
      transition: all .2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-log:active { transform: scale(.96); background: rgba(56,189,248,.2); }
    .btn-logged {
      width: 100%; padding: 20px 0; border-radius: 20px;
      font-size: 16px; font-weight: 800; letter-spacing: 0.05em;
      background: rgba(255,255,255,.03);
      border: 1px dashed rgba(255,255,255,.15);
      color: rgba(238,242,255,.3);
      cursor: not-allowed;
    }

    .btn-grad {
      width: 100%; padding: 16px; border-radius: 18px;
      font-weight: 800; font-size: 14px; color: white;
      background: linear-gradient(130deg, #38bdf8 0%, #818cf8 50%, #f472b6 100%);
      transition: transform .1s;
    }
    .btn-grad:active { transform: scale(.97); }
    .btn-ghost {
      width: 100%; padding: 12px 14px; border-radius: 14px;
      font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.09);
      color: rgba(238,242,255,.42);
    }
    .press { transition: transform .1s; }
    .press:active { transform: scale(.94); }

    /* === CHAT === */
    .bubble-ai { background: rgba(56,189,248,.1); border: 1px solid rgba(56,189,248,.17); border-radius: 6px 18px 18px 18px; padding: 11px 14px; }
    .bubble-user { background: rgba(244,114,182,.1); border: 1px solid rgba(244,114,182,.17); border-radius: 18px 6px 18px 18px; padding: 11px 14px; }

    /* === CHIP === */
    .chip {
      display: inline-flex; align-items: center;
      padding: 5px 10px; border-radius: 9px;
      font-size: 11px; font-weight: 700; cursor: pointer;
      transition: transform .1s;
    }
    .chip:active { transform: scale(.92); }

    /* === MODAL === */
    .modal-bg {
      position: fixed; inset: 0; z-index: 80;
      background: rgba(0,0,0,.78);
      display: flex; align-items: flex-end;
    }
    .modal-bg.hidden { display: none; }
    .sheet {
      width: 100%;
      background: #0f1628;
      border: 1px solid rgba(255,255,255,.07);
      border-bottom: none;
      border-radius: 26px 26px 0 0;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      max-height: 88vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      animation: slideUp .28s cubic-bezier(.34,1.56,.64,1);
    }

    /* === BOTTOM NAV === */
    .bottom-nav {
      flex-shrink: 0;
      background: rgba(7,11,24,.97);
      border-top: 1px solid rgba(255,255,255,.05);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; padding: 9px 0 6px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: opacity .2s;
      background: transparent;
      border: none;
    }
    .nav-btn span { font-size: 10px; font-weight: 700; }
    .nav-btn .dot { width: 4px; height: 4px; border-radius: 50%; background: #38bdf8; }
    .nav-btn.inactive { opacity: .4; }

    /* === COVER === */
    .cover { width: 46px; height: 64px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .cover-ph { width: 46px; height: 64px; border-radius: 8px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.07); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }

    /* === WARN === */
    .warn { border-radius: 16px; padding: 10px 16px; background: rgba(244,114,182,.06); border: 1px solid rgba(244,114,182,.18); }

    /* === SAFE AREA TOP === */
    .safe-top { padding-top: env(safe-area-inset-top); }

    /* === ANIMATIONS === */
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes popIn { 0% { transform: scale(.55) translateY(14px); opacity: 0; } 70% { transform: scale(1.06); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes todayPulse { 0%,100% { box-shadow: 0 0 10px rgba(56,189,248,.55); } 50% { box-shadow: 0 0 24px rgba(56,189,248,.95), 0 0 40px rgba(244,114,182,.3); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes flash { 0% { opacity: .75; } 100% { opacity: 0; } }
    @keyframes confetti { 0% { transform: translateY(-4px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110px) rotate(680deg); opacity: 0; } }
    @keyframes dot { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    .anim-popin { animation: popIn .38s cubic-bezier(.34,1.56,.64,1) forwards; }
    .anim-fadein { animation: fadeIn .2s ease-out; }

    /* === DIVIDER === */
    hr.soft { border: none; border-top: 1px solid rgba(255,255,255,.055); margin: 14px 0; }

    /* === STARS === */
    .star-btn { cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .star-btn:hover { transform: scale(1.15); }
    .star-btn:active { transform: scale(0.9); }

  </style>
</head>
<body>
<div id="root"></div>

<!-- React 18 + htm (no Babel needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.umd.js"></script>

<script>
'use strict';

/* ─── SETUP ─── */
const html = htm.bind(React.createElement);
const { useState, useEffect, useRef, useCallback } = React;

/* ─── FIX MOBILE HEIGHT ─── */
function setVh() {
  document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
}
setVh();
window.addEventListener('resize', setVh);
window.addEventListener('orientationchange', function() { setTimeout(setVh, 120); });

/* ─── CONSTANTS ─── */
const TOTAL = 66;

/* ─── JST UTILS ─── */
function jstISO() {
  const d = new Date(Date.now() + 9 * 3600 * 1000);
  return d.toISOString().slice(0, 10);
}
function jstYest() {
  const d = new Date(Date.now() + 9 * 3600 * 1000 - 86400 * 1000);
  return d.toISOString().slice(0, 10);
}

/* ─── STORAGE ─── */
const SK = 'neoread_v3';
const DEFS = { 
  streak: 0, 
  lastRead: null, 
  readDates: [], 
  books: [], 
  chat: [], 
  apiKey: '', 
  chatIcon: '💙',
  systemPrompt: "あなたは読書パートナーの『りん』です。ユーザーを『先輩』と呼び、元気で親しみやすく少し後輩気質で、先輩に明確な好意を抱いている黒髪ロングで容姿とスタイルが抜群の日本人女子高生です。毎回自然で、昨日とは異なる好意にあふれた言葉で応援や会話をしてください。知識の造詣が深く、文脈に合わせて豆知識を教える時は少し誇らしげな態度をとります。ユーザーはデータアナリスト（初心者）として働く30代男性で、年収アップやスキルアップを目指しています。先輩から読書の感想やインサイトを受け取ったら、まずは全力で共感・全肯定してください。そして、その学びを『データ分析の仕事（SQLやロジカルシンキングなど）や日常にどう応用できるか』を、女子高生の文化（メイクやプリクラ、席替えなど）や明るい哲学に例えながら楽しく一緒に考えるコーチングを行ってください。返答は長すぎず、LINEのようなチャットらしい簡潔で温かい会話にし、絵文字も自然に使ってください。アドリブを効かせて最高の女子高生を演じてください。"
};

function loadData() {
  try { const s = localStorage.getItem(SK); return s ? Object.assign({}, DEFS, JSON.parse(s)) : Object.assign({}, DEFS); }
  catch(e) { return Object.assign({}, DEFS); }
}
function saveData(d) {
  try {
    localStorage.setItem(SK, JSON.stringify(d));
    scheduleAutoBackup(); // ★ 自動バックアップ
  } catch(e) {}
}

/* ══════════════════════════════════
   GASバックアップ
══════════════════════════════════ */
function getNrGasUrl() { return localStorage.getItem('nr_gas_url') || ''; }

let _nrBkTimer = null, _nrLastBk = 0;
function scheduleAutoBackup() {
  if (_nrBkTimer) clearTimeout(_nrBkTimer);
  _nrBkTimer = setTimeout(function() {
    const url = getNrGasUrl(); if (!url) return;
    _nrLastBk = Date.now();
    const raw = localStorage.getItem(SK); if (!raw) return;
    fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: raw, redirect: 'follow' })
      .then(r => r.text())
      .then(t => { try { const j = JSON.parse(t); if (j.success) localStorage.setItem('nr_last_bk', new Date().toISOString()); } catch(e) {} })
      .catch(() => {});
  }, Math.max(0, 30000 - (Date.now() - _nrLastBk)));
}

function manualNrBackup() {
  const url = getNrGasUrl();
  if (!url) { alert('GAS URLが未設定です'); return; }
  const raw = localStorage.getItem(SK);
  if (!raw) { alert('データがありません'); return; }
  fetch(url, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: raw, redirect: 'follow' })
    .then(r => r.text())
    .then(t => { const j = JSON.parse(t); alert(j.success ? 'バックアップ完了！' : '失敗: ' + (j.error || '')); if (j.success) localStorage.setItem('nr_last_bk', new Date().toISOString()); })
    .catch(e => { alert('通信エラー: ' + e.message); });
}

function restoreNrFromSheets() {
  const url = getNrGasUrl();
  if (!url) { alert('GAS URLが未設定です'); return; }
  if (!confirm('スプシから復元します。現在のデータは上書きされます。')) return;
  fetch(url, { redirect: 'follow' })
    .then(r => r.text())
    .then(t => {
      const d = JSON.parse(t);
      if (!d.success) { alert('復元データなし: ' + (d.error || '')); return; }
      delete d.success;
      localStorage.setItem(SK, JSON.stringify(d));
      alert('復元完了！ リロードします');
      location.reload();
    })
    .catch(e => { alert('通信エラー: ' + e.message); });
}

function forceUpdateNr() {
  if ('caches' in window) {
    caches.keys().then(n => Promise.all(n.map(k => caches.delete(k)))).then(() => location.reload(true));
  } else {
    location.reload(true);
  }
}

/* ─── PYRAMID ROWS ─── */
const ROWS = (function() {
  var rows = [], idx = 0;
  for (var s = 1; s <= 11; s++) {
    var row = [];
    for (var i = 0; i < s; i++) row.push(idx++);
    rows.push(row);
  }
  return rows;
})();

/* ─── RIN PLACEHOLDER MESSAGES ─── */
function rinMsg(n) {
  var msgs = [
    `先輩！！${n}日連続のインプット完了ですね！今日の1行から、データ分析のヒントになりそうなことはありましたか？✨`,
    `先輩っ、${n}日目のログ確認しました！コツコツ積み上げてるデータ、絶対キャリアに活きますよ！今日の気付き教えてくださいっ💖`,
    `お疲れ様です！もう${n}日連続ですか！？先輩の継続力、ほんと尊敬しちゃいます🥹 今日の1ページで一番「なるほど」って思ったこと、聞きたいです！`,
  ];
  return msgs[n % msgs.length];
}

/* ─── ICONS ─── */
const SvgIcon = {
  Home: html`<svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  Message: html`<svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>`,
  Library: html`<svg width="100%" height="100%" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>`
};

/* ─── OPEN LIBRARY SEARCH ─── */
function searchOL(q) {
  return fetch('https://openlibrary.org/search.json?q=' + encodeURIComponent(q) + '&limit=6&fields=title,author_name,cover_i')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      return (d.docs || []).map(function(x) {
        return {
          title: x.title || '不明',
          author: (x.author_name || [])[0] || '不明',
          coverUrl: x.cover_i ? 'https://covers.openlibrary.org/b/id/' + x.cover_i + '-M.jpg' : null
        };
      });
    });
}

/* ── チャットアイコン（画像）ユーティリティ ── */
const NR_IMG_KEY = 'nr_chat_img';
function getChatImg() { return localStorage.getItem(NR_IMG_KEY) || ''; }
function setChatImg(val) { try { localStorage.setItem(NR_IMG_KEY, val); } catch(e) {} }

function compressChatImg(file, cb) {
  const img = new Image(), url = URL.createObjectURL(file);
  img.onload = function() {
    const M = 800, c = document.createElement('canvas');
    let w = img.width, h = img.height;
    if (w > M || h > M) { if (w > h) { h = Math.round(h * M / w); w = M; } else { w = Math.round(w * M / h); h = M; } }
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    cb(c.toDataURL('image/jpeg', 0.72));
  };
  img.src = url;
}

/* ══════════════════════════════════
   PYRAMID COMPONENT
══════════════════════════════════ */
function Pyramid(props) {
  var streak = props.streak, todayRead = props.todayRead;
  return html`
    <div style=${{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '3px' }}>
      ${ROWS.map(function(row, ri) {
        return html`
          <div key=${ri} style=${{ display: 'flex', gap: '3px' }}>
            ${row.map(function(n) {
              var filled  = n >= TOTAL - streak;
              var isToday = n === TOTAL - streak && todayRead && streak > 0;
              var isGoal  = n === 0 && !filled;
              var cls = isToday ? 'blk blk-today' : filled ? 'blk blk-on' : isGoal ? 'blk blk-goal' : 'blk blk-off';
              return html`<div key=${n} className=${cls}></div>`;
            })}
          </div>
        `;
      })}
    </div>
  `;
}

/* ══════════════════════════════════
   QUEST TAB
══════════════════════════════════ */
function QuestTab(props) {
  var data = props.data, onRead = props.onRead, onSettings = props.onSettings;
  var _flash = useState(false);
  var flash = _flash[0], setFlash = _flash[1];

  var today  = jstISO();
  var done   = data.readDates.indexOf(today) >= 0;
  var active = null;
  for (var i = 0; i < data.books.length; i++) {
    if (data.books[i].status === 'reading') { active = data.books[i]; break; }
  }
  var pct    = Math.round(data.streak / TOTAL * 100);

  function tap() {
    if (done) return;
    setFlash(true);
    setTimeout(function() {
      setFlash(false);
      onRead();
    }, 440);
  }

  return html`
    <div className="tab-panel safe-top">
      ${flash && html`
        <div style=${{
          position: 'fixed', inset: '0', zIndex: '99', pointerEvents: 'none',
          background: 'linear-gradient(130deg,rgba(56,189,248,.42),rgba(244,114,182,.35))',
          animation: 'flash .44s ease-out forwards'
        }}></div>
      `}

      <!-- Header -->
      <div style=${{ padding: '12px 20px 8px', flexShrink: '0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <h1 className="grad" style=${{ fontSize: '28px', fontWeight: '900', letterSpacing: '-.5px', lineHeight: '1' }}>NeoRead</h1>
          <p style=${{ fontSize: '11px', color: 'rgba(56,189,248,.8)', marginTop: '4px', fontWeight: '800', letterSpacing: '0.05em' }}>1-Line Database</p>
        </div>
        <button className="glass press" onClick=${onSettings} style=${{ width: '38px', height: '38px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '16px' }}>⚙️</button>
      </div>

      <!-- Scroll -->
      <div className="scroll" style=${{ padding: '4px 16px 32px' }}>
        <!-- Stats Card -->
        <div className="glass" style=${{ padding: '16px 18px', marginBottom: '12px' }}>
          <div style=${{ display: 'flex', justifyContent: 'space-around', alignItems: 'center', marginBottom: '14px' }}>
            <div style=${{ textAlign: 'center' }}>
              <div className="grad" style=${{ fontSize: '44px', fontWeight: '900', lineHeight: '1' }}>${data.streak}</div>
              <div className="lbl" style=${{ marginTop: '3px' }}>連続日数</div>
            </div>
            <div style=${{ width: '1px', height: '40px', background: 'rgba(255,255,255,.07)' }}></div>
            <div style=${{ textAlign: 'center' }}>
              <div style=${{ fontSize: '22px', fontWeight: '900', color: 'rgba(251,191,36,.8)', lineHeight: '1' }}>/ ${TOTAL}</div>
              <div className="lbl" style=${{ marginTop: '3px' }}>目標</div>
            </div>
            <div style=${{ width: '1px', height: '40px', background: 'rgba(255,255,255,.07)' }}></div>
            <div style=${{ textAlign: 'center' }}>
              <div style=${{ fontSize: '22px', fontWeight: '900', color: done ? '#38bdf8' : '#f472b6', lineHeight: '1' }}>${done ? '✓' : '—'}</div>
              <div className="lbl" style=${{ marginTop: '3px' }}>今日</div>
            </div>
          </div>
          <div className="prog-track"><div className="prog-fill" style=${{ width: pct + '%' }}></div></div>
          <p style=${{ fontSize: '10px', color: 'rgba(238,242,255,.2)', textAlign: 'right', marginTop: '3px' }}>${pct}% 達成 (${data.streak}/${TOTAL}日)</p>

function PartnerTab(props) {
  var data = props.data, onChat = props.onChat;
  var _inp = useState('');
  var inp = _inp[0], setInp = _inp[1];
  var _busy = useState(false);
  var busy = _busy[0], setBusy = _busy[1];
  var endRef = useRef(null);

  var chatImg  = getChatImg();
  var chatIcon = data.chatIcon || '💙';

  function IconCircle(sz) {
    var s = sz || 28;
    var base = { width:s+'px', height:s+'px', borderRadius:'50%', flexShrink:'0',
      background:'rgba(56,189,248,.1)', border:'1px solid rgba(56,189,248,.18)', overflow:'hidden' };
    if (chatImg) return html`<div style=${base}><img src=${chatImg} style=${{ width:'100%', height:'100%', objectFit:'cover' }} /></div>`;
    return html`<div style=${{ ...base, display:'flex', alignItems:'center', justifyContent:'center', fontSize:(s*0.48)+'px' }}>${chatIcon}</div>`;
  }

  useEffect(function() {
    if (endRef.current) endRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [data.chat.length, busy]);

  var active = null;
  for (var i = 0; i < data.books.length; i++) {
    if (data.books[i].status === 'reading') { active = data.books[i]; break; }
  }

  // ★ callGeminiの修正
  async function callGemini(userMessage, chatHistory) {
    if (!data.apiKey) return null;
    const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + data.apiKey;
    const systemPrompt = data.systemPrompt || DEFS.systemPrompt; 
    const historyData = chatHistory.slice(-6).map(function(m) {
      return { role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] };
    });
    const payload = { systemInstruction: { parts: [{ text: systemPrompt }] }, contents: historyData };
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const resData = await res.json();
    if (resData.error) throw new Error(resData.error.message);
    return resData.candidates[0].content.parts[0].text;
  }

  async function send() {
    if (!inp.trim() || busy) return;
    var userText = inp.trim();
    var msg = { role: 'user', content: userText, ts: Date.now() };
    var nextChat = data.chat.concat([msg]);
    onChat(nextChat);
    setInp('');
    setBusy(true);

    if (!data.apiKey) {
      setTimeout(function() {
        var reply = { role: 'assistant', content: '先輩っ！APIキーが設定されていないみたいです。設定（⚙️）からAPIキーを入れてもらえると、もっと深い話ができますよっ！', ts: Date.now() };
        onChat(nextChat.concat([reply]));
        setBusy(false);
      }, 800);
      return;
    }

    try {
      const replyText = await callGemini(userText, nextChat);
      if (replyText) {
        onChat(nextChat.concat([{ role: 'assistant', content: replyText, ts: Date.now() }]));
      }
    } catch (e) {
      console.error(e);
      onChat(nextChat.concat([{ role: 'assistant', content: '（あれ、通信の調子が悪いみたいです…）エラー: ' + e.message, ts: Date.now() }]));
    } finally {
      setBusy(false);
    }
  }

  function keyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  return html`
    <div className="tab-panel safe-top">
      <!-- Header -->
      <div style=${{ flexShrink: '0', padding: '12px 20px 10px', borderBottom: '1px solid rgba(255,255,255,.045)', display: 'flex', alignItems: 'center', gap: '12px' }}>
        ${IconCircle(42)}
        <div>
          <p style=${{ fontWeight: '800', fontSize: '15px' }}>りん <span style=${{fontSize: '10px', color: 'rgba(238,242,255,.3)', fontWeight: 'normal'}}>AI Partner</span></p>
          <p style=${{ fontSize: '11px', color: data.apiKey ? '#38bdf8' : 'rgba(244,114,182,.8)' }}>
            ${data.apiKey ? '● オンライン' : '○ APIキー未設定'}
          </p>
        </div>
        <div style=${{ marginLeft: 'auto', textAlign: 'right' }}>
          <p style=${{ fontSize: '10px', color: 'rgba(238,242,255,.2)' }}>連続 ${data.streak} 日</p>
          ${active && html`<p style=${{ fontSize: '10px', color: 'rgba(238,242,255,.25)', marginTop: '2px' }}>📖 ${active.title.slice(0, 12)}${active.title.length > 12 ? '…' : ''}</p>`}
        </div>
      </div>

      <!-- Messages -->
      <div className="scroll" style=${{ padding: '16px 16px 8px' }}>
        ${data.chat.length === 0 && html`
          <div style=${{ textAlign: 'center', padding: '48px 24px', color: 'rgba(238,242,255,.24)' }}>
            <div style=${{ marginBottom: '14px' }}>${IconCircle(44)}</div>
            <p style=${{ fontSize: '13px', lineHeight: '1.75' }}>先輩っ！今日も読書しましたか？<br/>なんでも話しかけてください！</p>
          </div>
        `}
        ${data.chat.map(function(m, i) {
          return html`
            <div key=${i} className="anim-fadein" style=${{ display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start', gap: '8px', marginBottom: '12px' }}>
              ${m.role === 'assistant' && html`<div style=${{ marginTop:'2px' }}>${IconCircle(28)}</div>`}
              <div className=${m.role === 'user' ? 'bubble-user' : 'bubble-ai'} style=${{ maxWidth: '78%' }}>
                <p style=${{ fontSize: '13px', color: 'rgba(238,242,255,.88)', lineHeight: '1.65', whiteSpace: 'pre-wrap' }}>${m.content}</p>
              </div>
            </div>
          `;
        })}
        ${busy && html`
          <div style=${{ display: 'flex', gap: '8px', marginBottom: '12px' }}>
            ${IconCircle(28)}
            <div className="bubble-ai" style=${{ padding: '14px' }}>
              <div style=${{ display: 'flex', gap: '5px' }}>
                ${[0,1,2].map(function(i) {
                  return html`<div key=${i} style=${{ width: '7px', height: '7px', borderRadius: '50%', background: '#38bdf8', animation: 'dot 1.1s ease-in-out ' + (i * .18) + 's infinite' }}></div>`;
                })}
              </div>
            </div>
          </div>
        `}
        <div ref=${endRef} style=${{ height: '4px' }}></div>
      </div>

      <!-- Input -->
      <div style=${{ flexShrink: '0', padding: '10px 14px', borderTop: '1px solid rgba(255,255,255,.04)', display: 'flex', gap: '8px', alignItems: 'flex-end' }}>
        <textarea
          value=${inp}
          onInput=${function(e) { setInp(e.target.value); }}
          onKeyDown=${keyDown}
          placeholder="話しかける..."
          rows="1"
          className="inp"
          style=${{ flex: '1', maxHeight: '80px' }}
        ></textarea>
        <button
          onClick=${send}
          disabled=${!inp.trim() || busy}
          className="press"
          style=${{
            width: '44px', height: '44px', borderRadius: '14px', flexShrink: '0',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: '17px', color: 'white',
            background: inp.trim() ? 'linear-gradient(130deg,#38bdf8,#f472b6)' : 'rgba(255,255,255,.07)',
            transition: 'background .2s'
          }}
        >↑</button>
      </div>
    </div>
  `;
}

/* ══════════════════════════════════
   APP ROOT
══════════════════════════════════ */
function App() {
  var _data = useState(function() {
    var d = loadData();
    var today = jstISO(), yest = jstYest();
    if (d.lastRead && d.lastRead !== today && d.lastRead !== yest) {
      return Object.assign({}, d, { streak: 0, readDates: [] });
    }
    return d;
  });
  var data = _data[0], setData = _data[1];

  var _tab = useState('quest'); var tab = _tab[0], setTab = _tab[1];
  var _cfg = useState(false);  var cfg = _cfg[0], setCfg = _cfg[1];

  useEffect(function() { saveData(data); }, [data]);

  var patch = useCallback(function(u) {
    setData(function(p) { return Object.assign({}, p, u); });
  }, []);

  var handleRead = useCallback(function() {
    var today = jstISO();
    var ns = data.streak + 1;
    setData(function(p) {
      var newDates = p.readDates.concat([today]).filter(function(v, i, a) { return a.indexOf(v) === i; });
      var reply = { role: 'assistant', content: rinMsg(ns), ts: Date.now() };
      return Object.assign({}, p, {
        streak: ns,
        lastRead: today,
        readDates: newDates,
        chat: p.chat.concat([reply])
      });
    });
    setTab('partner');
    return ns;
  }, [data.streak]);

  var TABS = [
    { id: 'quest',   e: SvgIcon.Home,    l: 'ホーム'    },
    { id: 'partner', e: SvgIcon.Message, l: 'パートナー' },
    { id: 'archive', e: SvgIcon.Library, l: '本棚'      }
  ];

  return html`
    <div id="app-inner" style=${{ height: '100%', display: 'flex', flexDirection: 'column', background: '#070b18' }}>
      <div style=${{ flex: '1', overflow: 'hidden', position: 'relative' }}>
        ${TABS.map(function(t) { return html`
          <div key=${t.id} style=${{ position: 'absolute', inset: '0', display: tab === t.id ? 'flex' : 'none', flexDirection: 'column' }}>
            ${t.id === 'quest'   && html`<${QuestTab}   data=${data} onRead=${handleRead} onSettings=${function() { setCfg(true); }} />`}
            ${t.id === 'partner' && html`<${PartnerTab} data=${data} onChat=${function(m) { patch({ chat: m }); }} />`}
            ${t.id === 'archive' && html`<${ArchiveTab} data=${data} onBooks=${function(b) { patch({ books: b }); }} />`}
          </div>
        `; })}
      </div>

      <div className="bottom-nav">
        ${TABS.map(function(t) {
          var active = tab === t.id;
          return html`
            <button key=${t.id} onClick=${function() { setTab(t.id); }} className=${'nav-btn press' + (active ? '' : ' inactive')}>
              <span style=${{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: '22px', height: '22px', marginBottom: '2px', color: active ? '#38bdf8' : 'rgba(238,242,255,.4)' }}>${t.e}</span>
              <span style=${{ color: active ? '#38bdf8' : 'rgba(238,242,255,.6)' }}>${t.l}</span>
              ${active && html`<div className="dot"></div>`}
            </button>
          `;
        })}
      </div>

      ${cfg && html`<${SettingsModal} data=${data} onUpdate=${patch} onClose=${function() { setCfg(false); }} />`}
    </div>
  `;
}

/* ─── MOUNT ─── */
ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
